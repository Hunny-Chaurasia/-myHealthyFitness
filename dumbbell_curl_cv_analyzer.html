
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary)}
#root{padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.header h2{font-size:18px;font-weight:500}
.badge{font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.video-wrap{position:relative;width:100%;max-width:640px;background:#000;border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
video,canvas{display:block;width:100%;height:auto}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:1rem}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:0.75rem;text-align:center}
.card .label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.card .value{font-size:22px;font-weight:500}
.alerts{margin-top:1rem;min-height:80px}
.alert{padding:8px 12px;border-radius:var(--border-radius-md);margin-bottom:6px;font-size:13px;border:0.5px solid}
.alert.warn{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.alert.good{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.alert.err{background:#FCEBEB;color:#A32D2D;border-color:#E24B4A}
.phase-bar{display:flex;gap:6px;margin-top:0.75rem;flex-wrap:wrap}
.phase-pill{flex:1;text-align:center;padding:6px;border-radius:var(--border-radius-md);font-size:12px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-primary);transition:background .2s,color .2s}
.phase-pill.active{background:#E1F5EE;color:#085041;border-color:#1D9E75;font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:14px;font-weight:500;transition:background .15s}
.btn:hover{background:var(--color-background-secondary)}
.btn.danger{border-color:#E24B4A;color:#A32D2D}
.controls{display:flex;gap:8px;margin-top:0.75rem;flex-wrap:wrap;align-items:center}
#status{font-size:13px;color:var(--color-text-secondary)}
.score-ring{width:48px;height:48px;margin:0 auto 4px}
</style>

<div id="root">
  <div class="header">
    <h2>Dumbbell Curl Analyzer</h2>
    <span class="badge" id="model-status">Loading model...</span>
  </div>

  <div class="video-wrap" id="video-wrap">
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">Start Camera</button>
    <button class="btn danger" id="resetBtn">Reset</button>
    <span id="status">Camera off</span>
  </div>

  <div class="phase-bar">
    <div class="phase-pill" id="ph-setup">Setup</div>
    <div class="phase-pill" id="ph-curl">Curling</div>
    <div class="phase-pill" id="ph-hold">Hold</div>
    <div class="phase-pill" id="ph-lower">Lowering</div>
  </div>

  <div class="metrics">
    <div class="card"><div class="label">Total Reps</div><div class="value" id="m-reps">0</div></div>
    <div class="card"><div class="label">Elbow Angle</div><div class="value" id="m-elbow">--</div></div>
    <div class="card"><div class="label">Form Score</div><div class="value" id="m-score">--</div></div>
    <div class="card"><div class="label">Phase</div><div class="value" id="m-phase" style="font-size:14px;padding-top:4px">--</div></div>
  </div>

  <div class="alerts" id="alerts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
const KEYPOINTS = {
  LEFT_SHOULDER:11, RIGHT_SHOULDER:12,
  LEFT_ELBOW:13,    RIGHT_ELBOW:14,
  LEFT_WRIST:15,    RIGHT_WRIST:16,
  LEFT_HIP:23,      RIGHT_HIP:24
};

let detector=null, running=false, animId=null;
let repCount=0, phase='setup', holdTimer=0, lastPhaseTime=0;
let formScores=[], alertMap={};
let prevElbow=null;

const video=document.getElementById('video');
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');

function angle3(a,b,c){
  const ab=[a.x-b.x,a.y-b.y], cb=[c.x-b.x,c.y-b.y];
  const dot=ab[0]*cb[0]+ab[1]*cb[1];
  const magAB=Math.sqrt(ab[0]**2+ab[1]**2);
  const magCB=Math.sqrt(cb[0]**2+cb[1]**2);
  if(!magAB||!magCB)return 0;
  return Math.round(Math.acos(Math.max(-1,Math.min(1,dot/(magAB*magCB))))*180/Math.PI);
}

function angleVertical(p1,p2){
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  return Math.round(Math.abs(Math.atan2(dx,Math.abs(dy))*180/Math.PI));
}

function conf(kp,keys){
  return keys.every(k=>kp[k]&&kp[k].score>0.35);
}

function addAlert(id,msg,type){
  alertMap[id]={msg,type,time:Date.now()};
  renderAlerts();
}
function clearAlert(id){
  delete alertMap[id];
  renderAlerts();
}
function renderAlerts(){
  const el=document.getElementById('alerts');
  const now=Date.now();
  const items=Object.entries(alertMap).filter(([,v])=>now-v.time<4000);
  alertMap=Object.fromEntries(items);
  el.innerHTML=items.map(([,v])=>`<div class="alert ${v.type}">${v.msg}</div>`).join('');
}

function setPhase(p){
  if(phase===p)return;
  phase=p;
  lastPhaseTime=Date.now();
  ['setup','curl','hold','lower'].forEach(n=>{
    document.getElementById('ph-'+n).classList.toggle('active',p===n);
  });
  document.getElementById('m-phase').textContent=p.charAt(0).toUpperCase()+p.slice(1);
}

function drawPose(kp){
  const pairs=[
    [KEYPOINTS.LEFT_SHOULDER,KEYPOINTS.LEFT_ELBOW],
    [KEYPOINTS.LEFT_ELBOW,KEYPOINTS.LEFT_WRIST],
    [KEYPOINTS.RIGHT_SHOULDER,KEYPOINTS.RIGHT_ELBOW],
    [KEYPOINTS.RIGHT_ELBOW,KEYPOINTS.RIGHT_WRIST],
    [KEYPOINTS.LEFT_SHOULDER,KEYPOINTS.RIGHT_SHOULDER],
    [KEYPOINTS.LEFT_HIP,KEYPOINTS.RIGHT_HIP],
    [KEYPOINTS.LEFT_SHOULDER,KEYPOINTS.LEFT_HIP],
    [KEYPOINTS.RIGHT_SHOULDER,KEYPOINTS.RIGHT_HIP],
  ];
  ctx.lineWidth=3;
  ctx.strokeStyle='#1D9E75';
  pairs.forEach(([a,b])=>{
    if(kp[a]&&kp[b]&&kp[a].score>0.35&&kp[b].score>0.35){
      ctx.beginPath();
      ctx.moveTo(kp[a].x,kp[a].y);
      ctx.lineTo(kp[b].x,kp[b].y);
      ctx.stroke();
    }
  });
  Object.values(kp).forEach(p=>{
    if(p&&p.score>0.35){
      ctx.beginPath();
      ctx.arc(p.x,p.y,5,0,2*Math.PI);
      ctx.fillStyle='#1D9E75';
      ctx.fill();
    }
  });
}

function analyze(kp){
  const side = (kp[KEYPOINTS.RIGHT_WRIST]?.score||0) > (kp[KEYPOINTS.LEFT_WRIST]?.score||0) ? 'RIGHT':'LEFT';
  const sh = side==='RIGHT' ? kp[KEYPOINTS.RIGHT_SHOULDER] : kp[KEYPOINTS.LEFT_SHOULDER];
  const el = side==='RIGHT' ? kp[KEYPOINTS.RIGHT_ELBOW]    : kp[KEYPOINTS.LEFT_ELBOW];
  const wr = side==='RIGHT' ? kp[KEYPOINTS.RIGHT_WRIST]    : kp[KEYPOINTS.LEFT_WRIST];
  const hip= side==='RIGHT' ? kp[KEYPOINTS.RIGHT_HIP]      : kp[KEYPOINTS.LEFT_HIP];

  if(!sh||!el||!wr||!hip||sh.score<0.35||el.score<0.35||wr.score<0.35)return;

  const elbowAngle=angle3(sh,el,wr);
  const upperArmAngle=angleVertical(sh,el);
  const torsoAngle=angleVertical(sh,hip);

  document.getElementById('m-elbow').textContent=elbowAngle+'°';

  let score=100, issues=[];

  if(upperArmAngle>12){issues.push({id:'ua',msg:'Upper arm drifting forward — pin elbows to sides',type:'warn'});score-=20;}
  else clearAlert('ua');

  if(torsoAngle>15){issues.push({id:'to',msg:'Torso swaying — keep back straight and neutral',type:'err'});score-=25;}
  else clearAlert('to');

  if(phase==='curl'&&elbowAngle>160){issues.push({id:'inc',msg:'Not reaching full curl — aim for 130–140° elbow flexion',type:'warn'});score-=10;}
  else clearAlert('inc');

  issues.forEach(i=>addAlert(i.id,i.msg,i.type));
  score=Math.max(0,score);
  formScores.push(score);
  if(formScores.length>30)formScores.shift();
  const avg=Math.round(formScores.reduce((a,b)=>a+b,0)/formScores.length);
  const scoreEl=document.getElementById('m-score');
  scoreEl.textContent=avg+'%';
  scoreEl.style.color=avg>=80?'#3B6D11':avg>=60?'#854F0B':'#A32D2D';

  const now=Date.now();
  if(phase==='setup'||phase==='lower'){
    if(elbowAngle<160&&elbowAngle>100){
      setPhase('curl');
      addAlert('start','Curl started — keep upper arms pinned!','good');
    }
  }
  if(phase==='curl'){
    if(elbowAngle<=50){
      setPhase('hold');
      holdTimer=now;
      addAlert('hold','Top position — hold 1 second!','good');
    }
  }
  if(phase==='hold'){
    if(now-holdTimer>=800){
      setPhase('lower');
      addAlert('lower','Good hold! Now lower slowly (2–3 sec)','good');
    }
  }
  if(phase==='lower'){
    if(elbowAngle>=165){
      repCount++;
      document.getElementById('m-reps').textContent=repCount;
      setPhase('setup');
      addAlert('rep','Rep '+repCount+' complete!','good');
    }
  }
  if(prevElbow!==null){
    const diff=Math.abs(elbowAngle-prevElbow);
    if(phase==='lower'&&diff>40){
      addAlert('speed','Lowering too fast — take 2–3 seconds','err');
    }
  }
  prevElbow=elbowAngle;
}

async function loop(){
  if(!running)return;
  if(video.readyState>=2){
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    try{
      const poses=await detector.estimatePoses(video,{flipHorizontal:true});
      if(poses.length>0){
        const kp={};
        poses[0].keypoints.forEach((p,i)=>{kp[i]={x:p.x,y:p.y,score:p.score};});
        drawPose(kp);
        analyze(kp);
      }
    }catch(e){}
  }
  animId=requestAnimationFrame(loop);
}

document.getElementById('startBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('startBtn');
  if(running){
    running=false;
    if(animId)cancelAnimationFrame(animId);
    video.srcObject?.getTracks().forEach(t=>t.stop());
    btn.textContent='Start Camera';
    document.getElementById('status').textContent='Camera off';
    return;
  }
  btn.textContent='Starting...';
  document.getElementById('status').textContent='Requesting camera...';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    video.srcObject=stream;
    await video.play();
    document.getElementById('status').textContent='Model loading...';
    if(!detector){
      detector=await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
      );
    }
    document.getElementById('model-status').textContent='MoveNet active';
    running=true;
    btn.textContent='Stop Camera';
    document.getElementById('status').textContent='Tracking active';
    setPhase('setup');
    loop();
  }catch(e){
    document.getElementById('status').textContent='Error: '+e.message;
    btn.textContent='Start Camera';
  }
});

document.getElementById('resetBtn').addEventListener('click',()=>{
  repCount=0;
  formScores=[];
  alertMap={};
  prevElbow=null;
  phase='setup';
  document.getElementById('m-reps').textContent='0';
  document.getElementById('m-elbow').textContent='--';
  document.getElementById('m-score').textContent='--';
  document.getElementById('m-phase').textContent='--';
  document.getElementById('alerts').innerHTML='';
  ['setup','curl','hold','lower'].forEach(n=>document.getElementById('ph-'+n).classList.remove('active'));
});

(async()=>{
  try{
    await tf.ready();
    document.getElementById('model-status').textContent='TF ready — click Start';
  }catch(e){
    document.getElementById('model-status').textContent='TF load failed';
  }
})();
</script>

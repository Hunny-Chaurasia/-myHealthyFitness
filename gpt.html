<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myHealthyFitness</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --card: #161616;
            --accent: #c8f135;
            --text: #f0f0f0;
            --muted: #888;
            --border: #2a2a2a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards 0.2s;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 4/3;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, var(--card));
        }

        .img_style {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .skeleton {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .info {
            padding: 1.5rem;
        }

        .tag {
            display: inline-block;
            background: var(--accent);
            color: #000;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 999px;
            margin-bottom: 0.75rem;
        }

        .form_name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            line-height: 1;
            letter-spacing: 0.02em;
            margin-bottom: 1rem;
            color: var(--text);
            min-height: 2.4rem;
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .meta-label {
            color: var(--muted);
            font-weight: 400;
        }

        .meta-value {
            font-weight: 500;
            color: var(--text);
            text-align: right;
        }

        .equipement {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .equipement:hover {
            text-decoration: underline;
        }

        .Focused_Muscles i {
            font-style: normal;
            color: var(--text);
        }

        .error-msg {
            color: #ff5e5e;
            font-size: 0.85rem;
            padding: 1rem 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="img-wrapper">
            <div class="skeleton" id="skeleton"></div>
            <img class="img_style" src="" alt="Pose animation" style="display:none;" />
        </div>
        <div class="info">
            <span class="tag">Core Training</span>
            <h1 class="form_name">Loading...</h1>
            <div class="meta">
                <div class="meta-row">
                    <span class="meta-label">Equipment</span>
                    <a class="equipement" href="#">—</a>
                </div>
                <div class="meta-row">
                    <span class="meta-label">Focused Muscles</span>
                    <span class="meta-value Focused_Muscles"><i>—</i></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadPoseData() {
            try {
                const response = await fetch("https://raw.githubusercontent.com/Hunny-Chaurasia/-myHealthyFitness/main/core.xml");
                const xmlText = await response.text();

                const parser = new DOMParser();
                const xml = parser.parseFromString(xmlText, "text/xml");

                const pose = xml.getElementsByTagName("Pose")[0];

                const name     = pose.getElementsByTagName("Name")[0].textContent;
                const equipment = pose.getElementsByTagName("Equipment")[0].textContent;
                const muscles  = pose.getElementsByTagName("Focused_Muscles")[0].textContent;
                const gif      = pose.getElementsByTagName("url")[0].textContent;

                document.querySelector(".form_name").innerText = name;
                document.querySelector(".equipement").innerText = equipment;
                document.querySelector(".equipement").href = "#";
                document.querySelector(".Focused_Muscles i").innerText = muscles;

                const img = document.querySelector(".img_style");
                img.src = gif;
                img.style.display = "block";
                img.onload = () => {
                    document.getElementById("skeleton").style.display = "none";
                };
                img.onerror = () => {
                    document.getElementById("skeleton").style.display = "none";
                };

            } catch (error) {
                console.error("Error loading XML:", error);
                document.querySelector(".form_name").innerText = "Failed to load";
                document.querySelector(".info").insertAdjacentHTML(
                    'beforeend',
                    '<p class="error-msg">Could not fetch pose data. Check the XML URL or network connection.</p>'
                );
                document.getElementById("skeleton").style.display = "none";
            }
        }

        document.addEventListener("DOMContentLoaded", loadPoseData);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Motion Mentor | Dynamic Exercise Library</title>
    <link rel="icon" href="WhatsApp Image 2025-09-24 at 10.58.05 PM.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #c8f135;
            --accent-dark: #a8cc1a;
            --bg: #0a0a0a;
            --card-bg: #131313;
            --border: #262626;
            --border-hover: #c8f135;
            --text: #ededed;
            --muted: #888;
            --dim: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* ── HEADER ─────────────────────────────── */
        .app-header {
            position: relative;
            padding: 3rem 2.5rem 2rem;
            background: linear-gradient(160deg, #1a1f0f 0%, #0a0a0a 60%);
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }
        .app-header::before {
            content: 'CORE';
            position: absolute;
            right: -1rem;
            top: -1.5rem;
            font-family: 'Syne', sans-serif;
            font-size: 9rem;
            font-weight: 800;
            color: rgba(200,241,53,0.04);
            letter-spacing: -4px;
            pointer-events: none;
            user-select: none;
        }
        .header-eyebrow {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }
        .app-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.05;
            color: #fff;
        }
        .app-header h1 span { color: var(--accent); }
        .header-sub {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: var(--muted);
            max-width: 460px;
        }
        .live-dot {
            display: inline-block;
            width: 7px; height: 7px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s ease infinite;
            vertical-align: middle;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* ── SECTION HEADING ─────────────────────── */
        .core_Head {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 2.5rem 2.5rem 0.8rem;
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            border-left: none;
            background: none;
            margin: 0;
        }
        .core_Head .pill {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: #151515;
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 0.35rem 0.9rem;
            font-size: 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            color: var(--muted);
        }
        .core_Head .pill .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── GRID ────────────────────────────────── */
        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.4rem;
            padding: 1rem 2.5rem 2rem;
        }

        /* ── CARD ────────────────────────────────── */
        .exercise-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.22s ease, transform 0.22s ease, box-shadow 0.22s ease;
            display: flex;
            flex-direction: column;
        }
        .exercise-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 24px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,241,53,0.08);
        }

        .card-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
            padding: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* ── CARD MEDIA ──────────────────────────── */
        .card-media {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #151515;
            overflow: hidden;
        }
        .img_style {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: whitesmoke;
            transition: transform 0.3s ease;
        }
        .exercise-card:hover .img_style { transform: scale(1.04); }

        .card-media-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(10,10,10,0.7) 0%, transparent 55%);
            pointer-events: none;
        }
        .card-diff-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(10,10,10,0.82);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            color: var(--muted);
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        /* ── CARD BODY ───────────────────────────── */
        .card-content {
            padding: 1rem 1.1rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form_name {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
        }
        .badge-diff { display: none; }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.6rem;
        }
        .text_left {
            font-size: 0.68rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .equipement {
            color: var(--accent);
            font-weight: 500;
            text-decoration: none;
        }
        .Focused_Muscles {
            color: var(--text);
            font-weight: 400;
        }
        .Click_image {
            margin-top: auto;
            padding-top: 0.6rem;
            border-top: 1px solid var(--border);
            font-size: 0.65rem;
            color: var(--dim);
            text-align: center;
            letter-spacing: 0.3px;
        }
        .points-area { display: none; }

        /* ── LOADING ─────────────────────────────── */
        #loading_msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            gap: 1.2rem;
            color: var(--muted);
            font-size: 0.85rem;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── ERROR ───────────────────────────────── */
        #error_msg {
            max-width: 640px;
            margin: 3rem auto;
            background: #120e0e;
            border: 1px solid #3a1c1c;
            border-left: 4px solid #ff5050;
            border-radius: 18px;
            padding: 2rem;
            text-align: center;
        }
        .retry-btn {
            margin-top: 1.2rem;
            background: var(--accent);
            border: none;
            color: #0a0a0a;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .retry-btn:hover { background: #daff66; }

        /* ── MODAL ───────────────────────────────── */
        #steps_modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal_inner {
            max-width: 680px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            background: #0e0e0e;
            border: 1px solid #252525;
            border-radius: 24px;
            padding: 1.8rem 2rem 2.2rem;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            scrollbar-width: thin;
            scrollbar-color: #2a2a2a transparent;
        }
        .modal_inner::-webkit-scrollbar { width: 4px; }
        .modal_inner::-webkit-scrollbar-track { background: transparent; }
        .modal_inner::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        #close_modal_btn {
            position: sticky;
            top: 0;
            float: right;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            color: #aaa;
            padding: 5px 16px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            z-index: 2;
        }
        #close_modal_btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        .modal-img {
            width: 100%;
            border-radius: 16px;
            display: block;
            margin: 0.5rem 0 1.2rem;
            background: whitesmoke;
        }
        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1.2;
            margin-bottom: 0.3rem;
        }
        .modal-meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .modal-chip {
            background: #181818;
            border: 1px solid #262626;
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 0.7rem;
            color: var(--muted);
        }
        .modal-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
        }
        .info-cell {
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 0.9rem;
        }
        .info-cell .info-label {
            font-size: 0.62rem;
            color: var(--dim);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.3rem;
        }
        .info-cell .info-val {
            font-size: 0.82rem;
            color: var(--text);
            font-weight: 500;
        }

        /* steps */
        .steps-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.8px;
            margin: 1.4rem 0 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .steps-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .step-item {
            display: flex;
            gap: 0.9rem;
            margin-bottom: 0.9rem;
            align-items: flex-start;
        }
        .step-num {
            flex-shrink: 0;
            width: 26px; height: 26px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--accent);
            font-family: 'Syne', sans-serif;
        }
        .step-content .step-focus {
            font-size: 0.68rem;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .step-content .step-text {
            font-size: 0.84rem;
            color: #c4c4c4;
            line-height: 1.55;
        }

        /* mistakes */
        .mistakes-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #ff9d3b;
            letter-spacing: 0.8px;
            margin: 1.4rem 0 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .mistakes-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .mistake-item {
            display: flex;
            gap: 0.7rem;
            align-items: flex-start;
            margin-bottom: 0.6rem;
            font-size: 0.83rem;
            color: #bbb;
        }
        .mistake-icon {
            flex-shrink: 0;
            width: 18px; height: 18px;
            background: rgba(255,157,59,0.12);
            border: 1px solid rgba(255,157,59,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.62rem;
            font-weight: 700;
            color: #ff9d3b;
            margin-top: 1px;
        }

        hr { border-color: #252525; margin: 1rem 0; }

        /* ── RESPONSIVE ──────────────────────────── */
        @media (max-width: 640px) {
            .exercise-grid { padding: 0.8rem 1rem 1.5rem; gap: 1rem; }
            .core_Head { padding: 1.8rem 1rem 0.6rem; }
            .app-header { padding: 2rem 1.2rem 1.5rem; }
            .modal_inner { padding: 1.2rem; }
            .modal-info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <div class="header-eyebrow"><span class="live-dot"></span>Dynamic Exercise Library</div>
    <h1>⚡ CORE <span>COMPRESSION</span></h1>
    <p class="header-sub">Powered by your live XML · tap any card for full instructions & steps</p>
</div>

<div id="loading_msg">
    <div class="spinner"></div>
    <div style="color:#aaa;">Fetching exercises from repository ...</div>
    <div style="font-size:0.75rem; color:#555;">(core.xml · public repo)</div>
</div>

<div id="error_msg" style="display: none;"></div>

<h2 class="core_Head" id="head_Beginner" style="display: none;">
    🟢 BEGINNER
    <span class="pill"><span class="dot" style="background:#4ade80;"></span>Foundation level</span>
</h2>
<div class="exercise-grid" id="grid_Beginner"></div>

<h2 class="core_Head" id="head_Intermediate" style="display: none;">
    🟠 INTERMEDIATE
    <span class="pill"><span class="dot" style="background:#fb923c;"></span>Building strength</span>
</h2>
<div class="exercise-grid" id="grid_Intermediate"></div>

<h2 class="core_Head" id="head_Advanced" style="display: none;">
    🔴 ADVANCED
    <span class="pill"><span class="dot" style="background:#f87171;"></span>Peak performance</span>
</h2>
<div class="exercise-grid" id="grid_Advanced"></div>

<!-- modal overlay -->
<div id="steps_modal">
    <div class="modal_inner">
        <button id="close_modal_btn" onclick="window.closeModalFunc()">✕ CLOSE</button>
        <div id="modal_body"></div>
    </div>
</div>

<script>
    (function(){
        const XML_RAW_URL = "https://raw.githubusercontent.com/Hunny-Chaurasia/-myHealthyFitness/main/core.xml";

        function getElementText(parent, tagName) {
            if(!parent) return '';
            const el = parent.getElementsByTagName(tagName)[0];
            return el ? el.textContent.trim() : '';
        }

        function extractMuscles(poseNode) {
            const musclesNode = poseNode.getElementsByTagName('Focused_Muscles')[0];
            if(!musclesNode) return 'Core & stabilizers';
            const primary = musclesNode.getElementsByTagName('Primary')[0];
            if(primary) return primary.textContent.trim();
            let raw = musclesNode.textContent.trim().replace(/\s+/g, ' ');
            return raw.length > 60 ? raw.substring(0,60)+'...' : raw;
        }

        function extractDiseases(poseNode) {
            const dcNode = poseNode.getElementsByTagName('Diseases_Cured')[0];
            if(!dcNode) return 'Supports overall mobility';
            const targeted = dcNode.getElementsByTagName('Targeted')[0];
            if(targeted) return targeted.textContent.trim();
            return dcNode.textContent.trim().replace(/\s+/g, ' ').slice(0, 100);
        }

        function extractSteps(poseNode) {
            const steps = [];
            const stepNodes = poseNode.getElementsByTagName('step');
            for(let i=0; i<stepNodes.length; i++) {
                const s = stepNodes[i];
                const order = s.getAttribute('order') || (i+1).toString();
                const focus = s.getAttribute('focus') || '';
                const text = s.textContent.trim().replace(/\s+/g, ' ');
                steps.push({ order, focus, text });
            }
            return steps;
        }

        function extractMistakes(poseNode) {
            const mistakes = [];
            const commonNode = poseNode.getElementsByTagName('common_mistakes')[0];
            if(commonNode) {
                const innerMistakes = commonNode.getElementsByTagName('mistake');
                for(let m of innerMistakes) mistakes.push(m.textContent.trim());
            }
            const allMistake = poseNode.querySelectorAll('mistake, Mistake, common_mistakes mistake, common_mistakes Mistake');
            for(let m of allMistake) {
                let txt = m.textContent.trim();
                if(txt && !mistakes.includes(txt)) mistakes.push(txt);
            }
            return mistakes.slice(0, 6);
        }

        function parsePosesFromXML(xmlDoc) {
            const poses = xmlDoc.getElementsByTagName('Pose');
            if(!poses.length) throw new Error('XML document does not contain any <Pose> elements');
            const result = [];
            for(let i=0; i<poses.length; i++) {
                const pose = poses[i];
                const name = getElementText(pose, 'Name') || 'Exercise';
                let difficulty = pose.getAttribute('difficulty') || 'Beginner';
                if(difficulty.toLowerCase().includes('intermediate')) difficulty = 'Intermediate';
                else if(difficulty.toLowerCase().includes('advanced')) difficulty = 'Advanced';
                else difficulty = 'Beginner';

                let gifUrl = '';
                const urlNodes = pose.getElementsByTagName('url');
                for(let u of urlNodes) {
                    const type = u.getAttribute('type');
                    if(type === 'gif' || !type) { gifUrl = u.textContent.trim(); break; }
                }
                if(!gifUrl && urlNodes.length) gifUrl = urlNodes[0].textContent.trim();

                const equipment = getElementText(pose, 'Equipment') || 'No equipment';
                const muscles = extractMuscles(pose);
                const poseType = pose.getAttribute('Pose_type') || 'Functional';
                let preferredTime = getElementText(pose, 'Preferred_Time');
                if(!preferredTime) preferredTime = getElementText(pose, 'Preferred');
                if(!preferredTime) preferredTime = 'Anytime, after warm-up';

                const diseases = extractDiseases(pose);
                const steps = extractSteps(pose);
                const mistakes = extractMistakes(pose);

                result.push({ id: pose.getAttribute('id') || i, name, difficulty, gif: gifUrl, equipment, muscles, poseType, preferredTime, diseases, steps, mistakes });
            }
            return result;
        }

        async function fetchWithFallback() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(XML_RAW_URL, { mode: 'cors', cache: 'no-store', signal: controller.signal, headers: { 'Accept': 'application/xml, text/xml' } });
                clearTimeout(timeoutId);
                if(response.ok) {
                    const text = await response.text();
                    if(text.includes('<Pose') || text.includes('<excercises_Begginer')) return text;
                    throw new Error('XML content missing exercises');
                }
                throw new Error(`HTTP ${response.status}`);
            } catch (directErr) {
                console.warn("Direct fetch failed, trying proxy fallback", directErr);
                const proxyUrls = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(XML_RAW_URL)}`,
                    `https://corsproxy.io/?${encodeURIComponent(XML_RAW_URL)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(XML_RAW_URL)}`
                ];
                for(let proxy of proxyUrls) {
                    try {
                        const res = await fetch(proxy, { cache: 'no-store' });
                        if(res.ok) {
                            const txt = await res.text();
                            if(txt.includes('<Pose') || txt.includes('<excercises_Begginer')) return txt;
                        }
                    } catch(e) {}
                }
                throw new Error('Unable to fetch XML: network or CORS issues. Ensure repository is public and link accessible.');
            }
        }

        function sanitizeXmlString(xmlStr) {
            return xmlStr.replace(/&(?!(amp|lt|gt|quot|apos|#x?[0-9a-fA-F]+);)/g, '&amp;');
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function createExerciseCard(pose) {
            const card = document.createElement('div');
            card.className = 'exercise-card';

            const btn = document.createElement('button');
            btn.className = 'card-btn';
            btn.setAttribute('aria-label', `View details for ${pose.name}`);
            btn.addEventListener('click', (e) => { e.preventDefault(); openModal(pose); });

            // media wrapper
            const mediaDiv = document.createElement('div');
            mediaDiv.className = 'card-media';

            const img = document.createElement('img');
            img.className = 'img_style';
            img.alt = pose.name;
            img.loading = 'lazy';
            if(pose.gif && pose.gif.startsWith('http')) {
                img.src = pose.gif;
                img.onerror = () => {
                    img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"%3E%3Crect width="200" height="120" fill="%23222"/%3E%3Ctext x="50%25" y="50%25" fill="%23666" font-size="12" text-anchor="middle" dy=".3em"%3Epreview failed%3C/text%3E%3C/svg%3E';
                };
            } else {
                img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"%3E%3Crect width="200" height="120" fill="%23222"/%3E%3Ctext x="50%25" y="50%25" fill="%23555" font-size="10" text-anchor="middle"%3EGIF unavailable%3C/text%3E%3C/svg%3E';
            }
            mediaDiv.appendChild(img);

            const overlay = document.createElement('div');
            overlay.className = 'card-media-overlay';
            mediaDiv.appendChild(overlay);

            const diffBadge = document.createElement('div');
            diffBadge.className = 'card-diff-badge';
            diffBadge.textContent = pose.difficulty + ' · ' + (pose.poseType || 'core');
            mediaDiv.appendChild(diffBadge);

            btn.appendChild(mediaDiv);

            // card body
            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';

            const nameEl = document.createElement('div');
            nameEl.className = 'form_name';
            nameEl.textContent = pose.name;

            const equipP = document.createElement('div');
            equipP.className = 'text_left';
            equipP.innerHTML = `🛠️ <strong style="color:#555;font-weight:400;">Equipment:</strong> <span class="equipement">${escapeHtml(pose.equipment.substring(0, 40))}</span>`;

            const musclesP = document.createElement('div');
            musclesP.className = 'text_left';
            musclesP.innerHTML = `🎯 <strong style="color:#555;font-weight:400;">Focus:</strong> <span class="Focused_Muscles">${escapeHtml(pose.muscles.substring(0, 55))}</span>`;

            const clickHint = document.createElement('div');
            clickHint.className = 'Click_image';
            clickHint.innerHTML = '👆 Tap card for full guide & steps';

            contentDiv.appendChild(nameEl);
            contentDiv.appendChild(equipP);
            contentDiv.appendChild(musclesP);
            contentDiv.appendChild(clickHint);

            btn.appendChild(contentDiv);
            card.appendChild(btn);
            return card;
        }

        function openModal(pose) {
            const modalBody = document.getElementById('modal_body');
            modalBody.innerHTML = '';

            if(pose.gif && pose.gif.startsWith('http')) {
                const modalImg = document.createElement('img');
                modalImg.src = pose.gif;
                modalImg.className = 'modal-img';
                modalImg.alt = pose.name;
                modalBody.appendChild(modalImg);
            }

            // title
            const title = document.createElement('div');
            title.className = 'modal-title';
            title.textContent = pose.name;
            modalBody.appendChild(title);

            // chips row
            const metaRow = document.createElement('div');
            metaRow.className = 'modal-meta-row';
            [pose.difficulty, pose.poseType].forEach(t => {
                const chip = document.createElement('span');
                chip.className = 'modal-chip';
                chip.textContent = t;
                metaRow.appendChild(chip);
            });
            modalBody.appendChild(metaRow);

            // info grid
            const infoGrid = document.createElement('div');
            infoGrid.className = 'modal-info-grid';

            [
                { label: 'Equipment', val: pose.equipment },
                { label: 'Muscles', val: pose.muscles },
                { label: 'Best Time', val: pose.preferredTime },
                { label: 'Helps With', val: pose.diseases }
            ].forEach(item => {
                const cell = document.createElement('div');
                cell.className = 'info-cell';
                cell.innerHTML = `<div class="info-label">${escapeHtml(item.label)}</div><div class="info-val">${escapeHtml(item.val)}</div>`;
                infoGrid.appendChild(cell);
            });
            modalBody.appendChild(infoGrid);

            // steps
            if(pose.steps && pose.steps.length) {
                const stepsTitle = document.createElement('div');
                stepsTitle.className = 'steps-title';
                stepsTitle.textContent = '📋 EXECUTION STEPS';
                modalBody.appendChild(stepsTitle);

                pose.steps.forEach((step, idx) => {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'step-item';

                    const numEl = document.createElement('div');
                    numEl.className = 'step-num';
                    numEl.textContent = step.order || idx + 1;

                    const contentEl = document.createElement('div');
                    contentEl.className = 'step-content';

                    if(step.focus) {
                        const focusEl = document.createElement('div');
                        focusEl.className = 'step-focus';
                        focusEl.textContent = step.focus;
                        contentEl.appendChild(focusEl);
                    }

                    const textEl = document.createElement('div');
                    textEl.className = 'step-text';
                    textEl.textContent = step.text;
                    contentEl.appendChild(textEl);

                    stepDiv.appendChild(numEl);
                    stepDiv.appendChild(contentEl);
                    modalBody.appendChild(stepDiv);
                });
            }

            // mistakes
            if(pose.mistakes && pose.mistakes.length) {
                const warnTitle = document.createElement('div');
                warnTitle.className = 'mistakes-title';
                warnTitle.textContent = '⚠️ COMMON MISTAKES';
                modalBody.appendChild(warnTitle);

                pose.mistakes.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'mistake-item';

                    const icon = document.createElement('div');
                    icon.className = 'mistake-icon';
                    icon.textContent = '!';

                    const txt = document.createElement('span');
                    txt.textContent = m;

                    item.appendChild(icon);
                    item.appendChild(txt);
                    modalBody.appendChild(item);
                });
            }

            document.getElementById('steps_modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        window.closeModalFunc = function() {
            document.getElementById('steps_modal').style.display = 'none';
            document.body.style.overflow = '';
        };

        document.getElementById('steps_modal').addEventListener('click', function(e) {
            if(e.target === this) window.closeModalFunc();
        });

        function populateSections(posesArray) {
            const grids = { Beginner: document.getElementById('grid_Beginner'), Intermediate: document.getElementById('grid_Intermediate'), Advanced: document.getElementById('grid_Advanced') };
            const heads = { Beginner: document.getElementById('head_Beginner'), Intermediate: document.getElementById('head_Intermediate'), Advanced: document.getElementById('head_Advanced') };
            const counts = { Beginner: 0, Intermediate: 0, Advanced: 0 };

            Object.values(grids).forEach(g => g.innerHTML = '');

            posesArray.forEach(pose => {
                const key = ['Beginner','Intermediate','Advanced'].includes(pose.difficulty) ? pose.difficulty : 'Beginner';
                grids[key].appendChild(createExerciseCard(pose));
                counts[key]++;
            });

            Object.keys(heads).forEach(k => {
                heads[k].style.display = counts[k] > 0 ? 'flex' : 'none';
            });
        }

        async function initApp() {
            const loadingDiv = document.getElementById('loading_msg');
            const errorDiv = document.getElementById('error_msg');
            try {
                loadingDiv.style.display = 'flex';
                errorDiv.style.display = 'none';
                const xmlString = await fetchWithFallback();
                const cleanXml = sanitizeXmlString(xmlString);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(cleanXml, 'text/xml');
                const parseError = xmlDoc.querySelector('parsererror');
                if(parseError) throw new Error(`XML parse error: ${parseError.textContent.substring(0, 150)}`);
                const exercises = parsePosesFromXML(xmlDoc);
                if(!exercises.length) throw new Error('No exercises found in XML');
                populateSections(exercises);
                loadingDiv.style.display = 'none';
            } catch (err) {
                console.error('MotionMentor error:', err);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <div style="font-size:1.2rem; margin-bottom:10px;">⚠️ LOAD FAILED</div>
                    <div style="background:#1f1b1b; padding:1rem; border-radius:16px; font-size:0.85rem;">${escapeHtml(err.message)}</div>
                    <div style="margin-top:1rem; font-size:0.8rem; color:#888;">Make sure core.xml exists at<br><code style="background:#000;padding:4px;border-radius:4px;">${XML_RAW_URL}</code><br>Repository must be public.</div>
                    <button class="retry-btn" id="manualRetryBtn">⟳ RETRY NOW</button>
                `;
                document.getElementById('manualRetryBtn').addEventListener('click', () => initApp());
            }
        }

        initApp();
    })();
</script>
</body>
</html>

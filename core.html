<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Motion Mentor | Dynamic Exercise Library</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #ededed;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* modern gradient header */
        .app-header {
            background: linear-gradient(135deg, #101010 0%, #1a1f0f 100%);
            border-bottom: 1px solid #2a2a2a;
            padding: 1.8rem 2rem;
            margin-bottom: 1rem;
        }
        .app-header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #e0ff70, #b2ff00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
        }
        .app-header p {
            color: #aaa;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .core_Head {
            font-size: 1.8rem;
            font-weight: 600;
            padding: 1rem 2rem 0.2rem 2rem;
            margin: 1rem 0 0 0;
            letter-spacing: -0.3px;
            border-left: 5px solid #c8f135;
            background: linear-gradient(90deg, #1e1e1e, transparent);
        }

        /* grid layouts */
        .exercise-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.6rem;
            padding: 1.5rem 2rem 2rem 2rem;
        }

        /* modern card */
        .exercise-card {
            background: #131313;
            border-radius: 28px;
            border: 1px solid #262626;
            width: 320px;
            height: 85vh;
            transition: all 0.25s ease;
            overflow: hidden;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
        }
        .exercise-card:hover {
            transform: translateY(-6px);
            border-color: #c8f135;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6);
        }

        .card-btn {
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
            padding: 0;
        }

        .img_style {
            height: 82%;
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background: whitesmoke;
            display: block;
            transition: transform 0.2s;
           
        }
        .exercise-card:hover .img_style {
            transform: scale(1.02);
        }

        .card-content {
            padding: 1rem 1rem 1rem 1rem;
        }

        .form_name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #c8f135;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .badge-diff {
            display: inline-block;
            font-size: 0.7rem;
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 30px;
            margin-bottom: 8px;
            color: #bbb;
            letter-spacing: 0.3px;
        }

        .text_left {
            font-size: 0.75rem;
            color: #b0b0b0;
            margin: 0.35rem 0;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .equipement {
            color: #c8f135;
            text-decoration: none;
            font-weight: 500;
        }
        .Focused_Muscles {
            color: #ccc;
        }
        .Click_image {
            font-size: 0.68rem;
            margin-top: 0.7rem;
            color: #6a6a6a;
            border-top: 1px dashed #2a2a2a;
            padding-top: 0.6rem;
            text-align: center;
        }
        .points-area {
            font-size: 0.7rem;
            text-align: right;
            margin-top: 0.5rem;
            color: #5f5f5f;
            letter-spacing: 0.3px;
        }

        /* loading & error states */
        #loading_msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            gap: 1rem;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #2a2a2a;
            border-top: 3px solid #c8f135;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #error_msg {
            background: #1e1212;
            border-left: 4px solid #ff5c5c;
            max-width: 700px;
            margin: 3rem auto;
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
        }
        .retry-btn {
            background: #c8f135;
            border: none;
            color: #0a0a0a;
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            margin-top: 1.2rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.1s;
        }
        .retry-btn:hover {
            background: #daff66;
            transform: scale(0.98);
        }

        /* modal */
        #steps_modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5,5,5,0.92);
            backdrop-filter: blur(6px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal_inner {
            max-width: 680px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            background: #111;
            border-radius: 32px;
            border: 1px solid #2e2e2e;
            padding: 1.8rem 2rem 2rem 2rem;
            position: relative;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6);
        }
        #close_modal_btn {
            position: sticky;
            top: 0;
            float: right;
            background: #1e1e1e;
            border: 1px solid #3a3a3a;
            color: #ccc;
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        #close_modal_btn:hover {
            background: #c8f135;
            color: black;
            border-color: #c8f135;
        }
        .modal-img {
            width: 100%;
            border-radius: 20px;
            margin: 0.5rem 0 1rem 0;
            background: #1e1e1e;
        }
        .step-item {
            margin-bottom: 0.9rem;
            border-left: 2px solid #2c2c2c;
            padding-left: 0.9rem;
        }
        .step-number {
            font-weight: 700;
            color: #c8f135;
            font-size: 0.8rem;
        }
        hr {
            border-color: #252525;
            margin: 1rem 0;
        }

        @media (max-width: 660px) {
            .exercise-grid { justify-content: center; padding: 1rem; }
            .exercise-card { width: 280px; }
            .core_Head { font-size: 1.4rem; padding-left: 1rem; }
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>⚡ MOTION MENTOR</h1>
    <p>Dynamic exercise library · powered by your live XML · tap any card for full instructions</p>
</div>

<!-- loading indicator -->
<div id="loading_msg">
    <div class="spinner"></div>
    <div style="color:#aaa;">Fetching exercises from repository ...</div>
    <div style="font-size:0.75rem; color:#5f5f5f;">(core.xml · public repo)</div>
</div>

<div id="error_msg" style="display: none;"></div>

<!-- sections -->
<h2 class="core_Head" id="head_Beginner" style="display: none;">🟢 BEGINNER</h2>
<div class="exercise-grid" id="grid_Beginner"></div>

<h2 class="core_Head" id="head_Intermediate" style="display: none;">🟠 INTERMEDIATE</h2>
<div class="exercise-grid" id="grid_Intermediate"></div>

<h2 class="core_Head" id="head_Advanced" style="display: none;">🔴 ADVANCED</h2>
<div class="exercise-grid" id="grid_Advanced"></div>

<!-- modal overlay -->
<div id="steps_modal">
    <div class="modal_inner">
        <button id="close_modal_btn" onclick="window.closeModalFunc()">✕ CLOSE</button>
        <div id="modal_body"></div>
    </div>
</div>

<script>
    (function(){
        // DIRECT URL TO YOUR PUBLIC XML FILE (github raw)
        const XML_RAW_URL = "https://raw.githubusercontent.com/Hunny-Chaurasia/-myHealthyFitness/main/core.xml";
        
        // Helper to safely get text from XML element
        function getElementText(parent, tagName) {
            if(!parent) return '';
            const el = parent.getElementsByTagName(tagName)[0];
            return el ? el.textContent.trim() : '';
        }

        // Extract focused muscles (handles both simple tag or nested <Primary>)
        function extractMuscles(poseNode) {
            const musclesNode = poseNode.getElementsByTagName('Focused_Muscles')[0];
            if(!musclesNode) return 'Core & stabilizers';
            // check if contains <Primary> child
            const primary = musclesNode.getElementsByTagName('Primary')[0];
            if(primary) return primary.textContent.trim();
            // otherwise return whole inner text but clean
            let raw = musclesNode.textContent.trim().replace(/\s+/g, ' ');
            return raw.length > 60 ? raw.substring(0,60)+'...' : raw;
        }

        // Extract diseases (targeted or whole)
        function extractDiseases(poseNode) {
            const dcNode = poseNode.getElementsByTagName('Diseases_Cured')[0];
            if(!dcNode) return 'Supports overall mobility';
            const targeted = dcNode.getElementsByTagName('Targeted')[0];
            if(targeted) return targeted.textContent.trim();
            return dcNode.textContent.trim().replace(/\s+/g, ' ').slice(0, 100);
        }

        // Extract steps array
        function extractSteps(poseNode) {
            const steps = [];
            const stepNodes = poseNode.getElementsByTagName('step');
            for(let i=0; i<stepNodes.length; i++) {
                const s = stepNodes[i];
                const order = s.getAttribute('order') || (i+1).toString();
                const focus = s.getAttribute('focus') || '';
                const text = s.textContent.trim().replace(/\s+/g, ' ');
                steps.push({ order, focus, text });
            }
            return steps;
        }

        // Extract mistakes (mistake or Mistake tags)
        function extractMistakes(poseNode) {
            const mistakes = [];
            const allMistake = poseNode.querySelectorAll('mistake, Mistake, common_mistakes mistake, common_mistakes Mistake');
            // also inside <common_mistakes>
            const commonNode = poseNode.getElementsByTagName('common_mistakes')[0];
            if(commonNode) {
                const innerMistakes = commonNode.getElementsByTagName('mistake');
                for(let m of innerMistakes) mistakes.push(m.textContent.trim());
            }
            for(let m of allMistake) {
                let txt = m.textContent.trim();
                if(txt && !mistakes.includes(txt)) mistakes.push(txt);
            }
            return mistakes.slice(0, 6);
        }

        // Parse XML document to pose objects
        function parsePosesFromXML(xmlDoc) {
            const poses = xmlDoc.getElementsByTagName('Pose');
            if(!poses.length) throw new Error('XML document does not contain any <Pose> elements');
            const result = [];
            for(let i=0; i<poses.length; i++) {
                const pose = poses[i];
                const name = getElementText(pose, 'Name') || 'Exercise';
                let difficulty = pose.getAttribute('difficulty') || 'Beginner';
                // normalize difficulty (case)
                if(difficulty.toLowerCase().includes('intermediate')) difficulty = 'Intermediate';
                else if(difficulty.toLowerCase().includes('advanced')) difficulty = 'Advanced';
                else difficulty = 'Beginner';
                
                // GIF url: first <url> tag with type gif or just any url
                let gifUrl = '';
                const urlNodes = pose.getElementsByTagName('url');
                for(let u of urlNodes) {
                    const type = u.getAttribute('type');
                    if(type === 'gif' || !type) {
                        gifUrl = u.textContent.trim();
                        break;
                    }
                }
                if(!gifUrl && urlNodes.length) gifUrl = urlNodes[0].textContent.trim();
                
                const equipment = getElementText(pose, 'Equipment') || 'No equipment';
                const muscles = extractMuscles(pose);
                const poseType = pose.getAttribute('Pose_type') || 'Functional';
                let preferredTime = getElementText(pose, 'Preferred_Time');
                if(!preferredTime) preferredTime = getElementText(pose, 'Preferred');
                if(!preferredTime) preferredTime = 'Anytime, after warm-up';
                
                const diseases = extractDiseases(pose);
                const steps = extractSteps(pose);
                const mistakes = extractMistakes(pose);
                
                result.push({
                    id: pose.getAttribute('id') || i,
                    name,
                    difficulty,
                    gif: gifUrl,
                    equipment,
                    muscles,
                    poseType,
                    preferredTime,
                    diseases,
                    steps,
                    mistakes
                });
            }
            return result;
        }

        // fetch with robust CORS handling (use multiple fallback strategies)
        async function fetchWithFallback() {
            // Strategy 1: direct fetch (if CORS headers are permissive or using github raw with cors mode)
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch(XML_RAW_URL, { 
                    mode: 'cors', 
                    cache: 'no-store',
                    signal: controller.signal,
                    headers: { 'Accept': 'application/xml, text/xml' }
                });
                clearTimeout(timeoutId);
                if(response.ok) {
                    const text = await response.text();
                    if(text.includes('<Pose') || text.includes('<excercises_Begginer')) return text;
                    throw new Error('XML content missing exercises');
                }
                throw new Error(`HTTP ${response.status}`);
            } catch (directErr) {
                console.warn("Direct fetch failed, trying proxy fallback", directErr);
                // Strategy 2: allorigins (robust)
                const proxyUrls = [
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(XML_RAW_URL)}`,
                    `https://corsproxy.io/?${encodeURIComponent(XML_RAW_URL)}`,
                    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(XML_RAW_URL)}`
                ];
                for(let proxy of proxyUrls) {
                    try {
                        const res = await fetch(proxy, { cache: 'no-store' });
                        if(res.ok) {
                            const txt = await res.text();
                            if(txt.includes('<Pose') || txt.includes('<excercises_Begginer')) return txt;
                        }
                    } catch(e) {}
                }
                throw new Error('Unable to fetch XML: network or CORS issues. Ensure repository is public and link accessible.');
            }
        }

        // sanitize XML string (fix broken ampersands etc)
        function sanitizeXmlString(xmlStr) {
            // remove invalid control chars, but mostly ensure proper XML
            let cleaned = xmlStr.replace(/&(?!(amp|lt|gt|quot|apos|#x?[0-9a-fA-F]+);)/g, '&amp;');
            // sometimes extra spaces before tags
            return cleaned;
        }

        // build card component
        function createExerciseCard(pose) {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            
            const btn = document.createElement('button');
            btn.className = 'card-btn';
            btn.setAttribute('aria-label', `View details for ${pose.name}`);
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                openModal(pose);
            });
            
            const img = document.createElement('img');
            img.className = 'img_style';
            img.alt = pose.name;
            img.loading = 'lazy';
            if(pose.gif && pose.gif.startsWith('http')) {
                img.src = pose.gif;
                img.onerror = () => {
                    img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"%3E%3Crect width="200" height="120" fill="%23222"/%3E%3Ctext x="50%25" y="50%25" fill="%23666" font-size="12" text-anchor="middle" dy=".3em"%3Epreview failed%3C/text%3E%3C/svg%3E';
                };
            } else {
                img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"%3E%3Crect width="200" height="120" fill="%23222"/%3E%3Ctext x="50%25" y="50%25" fill="%23555" font-size="10" text-anchor="middle"%3EGIF unavailable%3C/text%3E%3C/svg%3E';
            }
            btn.appendChild(img);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';
            
            const nameEl = document.createElement('div');
            nameEl.className = 'form_name';
            nameEl.textContent = pose.name;
            
            const diffSpan = document.createElement('span');
            diffSpan.className = 'badge-diff';
            diffSpan.textContent = pose.difficulty + ' · ' + (pose.poseType || 'core');
            
            const equipP = document.createElement('div');
            equipP.className = 'text_left';
            equipP.innerHTML = `🛠️ Equipment: <span class="equipement">${escapeHtml(pose.equipment.substring(0, 40))}</span>`;
            
            const musclesP = document.createElement('div');
            musclesP.className = 'text_left';
            musclesP.innerHTML = `🎯 Focus: <span class="Focused_Muscles">${escapeHtml(pose.muscles.substring(0, 55))}</span>`;
            
            const clickHint = document.createElement('div');
            clickHint.className = 'Click_image';
            clickHint.innerHTML = '👆 Tap card → full guide & steps';
            
            const pointsDiv = document.createElement('div');
            pointsDiv.className = 'points-area';
            pointsDiv.innerHTML = '✨ motion points ready';
            
            contentDiv.appendChild(diffSpan);
            contentDiv.appendChild(nameEl);
            contentDiv.appendChild(equipP);
            contentDiv.appendChild(musclesP);
            contentDiv.appendChild(clickHint);
            contentDiv.appendChild(pointsDiv);
            
            btn.appendChild(contentDiv);
            card.appendChild(btn);
            return card;
        }
        
        // escape HTML
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // modal rendering
        function openModal(pose) {
            const modalBody = document.getElementById('modal_body');
            modalBody.innerHTML = '';
            
            if(pose.gif && pose.gif.startsWith('http')) {
                const modalImg = document.createElement('img');
                modalImg.src = pose.gif;
                modalImg.className = 'modal-img';
                modalImg.alt = pose.name;
                modalBody.appendChild(modalImg);
            }
            
            const title = document.createElement('h2');
            title.style.color = '#c8f135';
            title.style.marginBottom = '0.25rem';
            title.textContent = pose.name;
            modalBody.appendChild(title);
            
            const meta = document.createElement('div');
            meta.style.fontSize = '0.75rem';
            meta.style.color = '#aaa';
            meta.style.marginBottom = '1rem';
            meta.innerHTML = `${pose.difficulty} · ${pose.poseType} `;
            modalBody.appendChild(meta);
            
            const equipDetail = document.createElement('p');
            equipDetail.innerHTML = `<strong>📦 Equipment:</strong> ${escapeHtml(pose.equipment)}`;
            equipDetail.style.marginBottom = '0.5rem';
            modalBody.appendChild(equipDetail);
            
            const musclesDetail = document.createElement('p');
            musclesDetail.innerHTML = `<strong>💪 Muscles:</strong> ${escapeHtml(pose.muscles)}`;
            musclesDetail.style.marginBottom = '0.5rem';
            modalBody.appendChild(musclesDetail);
            
            const timeDetail = document.createElement('p');
            timeDetail.innerHTML = `<strong>⏱️ Best Time:</strong> ${escapeHtml(pose.preferredTime)}`;
            timeDetail.style.marginBottom = '0.5rem';
            modalBody.appendChild(timeDetail);
            
            const benefits = document.createElement('p');
            benefits.innerHTML = `<strong>🌟 Helps with:</strong> ${escapeHtml(pose.diseases)}`;
            benefits.style.marginBottom = '1rem';
            modalBody.appendChild(benefits);
            
            if(pose.steps && pose.steps.length) {
                const stepsTitle = document.createElement('h3');
                stepsTitle.textContent = '📋 EXECUTION STEPS';
                stepsTitle.style.margin = '1rem 0 0.8rem 0';
                stepsTitle.style.borderLeft = '3px solid #c8f135';
                stepsTitle.style.paddingLeft = '10px';
                modalBody.appendChild(stepsTitle);
                
                pose.steps.forEach((step, idx) => {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'step-item';
                    const stepNum = document.createElement('div');
                    stepNum.className = 'step-number';
                    stepNum.textContent = `${step.order || idx+1}. ${step.focus ? step.focus : 'Movement'}`;
                    const stepText = document.createElement('div');
                    stepText.style.fontSize = '0.85rem';
                    stepText.style.color = '#cfcfcf';
                    stepText.textContent = step.text;
                    stepDiv.appendChild(stepNum);
                    stepDiv.appendChild(stepText);
                    modalBody.appendChild(stepDiv);
                });
            }
            
            if(pose.mistakes && pose.mistakes.length) {
                const warnTitle = document.createElement('h3');
                warnTitle.textContent = '⚠️ COMMON MISTAKES';
                warnTitle.style.margin = '1.2rem 0 0.6rem 0';
                warnTitle.style.color = '#ffaa66';
                modalBody.appendChild(warnTitle);
                const list = document.createElement('ul');
                list.style.paddingLeft = '1.2rem';
                list.style.color = '#bbb';
                pose.mistakes.forEach(m => {
                    const li = document.createElement('li');
                    li.textContent = m;
                    li.style.marginBottom = '0.4rem';
                    list.appendChild(li);
                });
                modalBody.appendChild(list);
            }
            
            document.getElementById('steps_modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        
        window.closeModalFunc = function() {
            document.getElementById('steps_modal').style.display = 'none';
            document.body.style.overflow = '';
        };
        
        document.getElementById('steps_modal').addEventListener('click', function(e) {
            if(e.target === this) window.closeModalFunc();
        });
        
        // populate sections
        function populateSections(posesArray) {
            const beginnerGrid = document.getElementById('grid_Beginner');
            const intermediateGrid = document.getElementById('grid_Intermediate');
            const advancedGrid = document.getElementById('grid_Advanced');
            const headBeg = document.getElementById('head_Beginner');
            const headInt = document.getElementById('head_Intermediate');
            const headAdv = document.getElementById('head_Advanced');
            
            beginnerGrid.innerHTML = '';
            intermediateGrid.innerHTML = '';
            advancedGrid.innerHTML = '';
            
            let begCount = 0, intCount = 0, advCount = 0;
            
            posesArray.forEach(pose => {
                const card = createExerciseCard(pose);
                if(pose.difficulty === 'Beginner') {
                    beginnerGrid.appendChild(card);
                    begCount++;
                } else if(pose.difficulty === 'Intermediate') {
                    intermediateGrid.appendChild(card);
                    intCount++;
                } else if(pose.difficulty === 'Advanced') {
                    advancedGrid.appendChild(card);
                    advCount++;
                } else {
                    // fallback to beginner
                    beginnerGrid.appendChild(card);
                    begCount++;
                }
            });
            
            headBeg.style.display = begCount > 0 ? 'block' : 'none';
            headInt.style.display = intCount > 0 ? 'block' : 'none';
            headAdv.style.display = advCount > 0 ? 'block' : 'none';
        }
        
        // main initializer
        async function initApp() {
            const loadingDiv = document.getElementById('loading_msg');
            const errorDiv = document.getElementById('error_msg');
            try {
                loadingDiv.style.display = 'flex';
                errorDiv.style.display = 'none';
                const xmlString = await fetchWithFallback();
                const cleanXml = sanitizeXmlString(xmlString);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(cleanXml, 'text/xml');
                const parseError = xmlDoc.querySelector('parsererror');
                if(parseError) {
                    throw new Error(`XML parse error: ${parseError.textContent.substring(0, 150)}`);
                }
                const exercises = parsePosesFromXML(xmlDoc);
                if(!exercises.length) throw new Error('No exercises found in XML');
                populateSections(exercises);
                loadingDiv.style.display = 'none';
            } catch (err) {
                console.error('MotionMentor error:', err);
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <div style="font-size:1.2rem; margin-bottom:10px;">⚠️ LOAD FAILED</div>
                    <div style="background:#1f1b1b; padding:1rem; border-radius:16px; font-size:0.85rem;">${escapeHtml(err.message)}</div>
                    <div style="margin-top: 1rem; font-size:0.8rem; color:#888;">Possible fixes: Make sure core.xml exists at <br/> <code style="background:#000; padding:4px;">${XML_RAW_URL}</code><br/> Repository must be public. Try retry or check network.</div>
                    <button class="retry-btn" id="manualRetryBtn">⟳ RETRY NOW</button>
                `;
                const retryBtn = document.getElementById('manualRetryBtn');
                if(retryBtn) retryBtn.addEventListener('click', () => { initApp(); });
            }
        }
        
        initApp();
    })();
</script>
</body>
</html>
